# ─────────────────────────────────────────────────────────────────────────────
# application.properties
# Every value is read from an environment variable.
# In K8s: non-sensitive vars come from ConfigMap, sensitive from Secret.
# Locally: load config.env then run mvn spring-boot:run
# ─────────────────────────────────────────────────────────────────────────────

# ── App identity (ConfigMap) ──────────────────────────────────────────────────
app.name=${APP_NAME:StockRoom}
app.env=${APP_ENV:development}
app.version=${APP_VERSION:1.0.0}

# ── Server (ConfigMap) ───────────────────────────────────────────────────────
server.port=${SERVER_PORT:8080}

# ── Database — host/port/name from ConfigMap, credentials from Secret ────────
spring.datasource.url=jdbc:postgresql://${DB_HOST:database-1.cf22mmouy68h.eu-north-1.rds.amazonaws.com}:${DB_PORT:5432}/${DB_NAME:postgres}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:Rohith7799}
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.maximum-pool-size=5

# ── JPA ──────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# ── File upload (ConfigMap) ───────────────────────────────────────────────────
app.upload.path=${UPLOAD_PATH:/tmp/stockroom/uploads}
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE_MB:10}MB
spring.servlet.multipart.max-request-size=${MAX_FILE_SIZE_MB:10}MB

# ── JWT — expiry in ConfigMap, signing secret in Secret ──────────────────────
app.jwt.secret=${JWT_SECRET:changeme-at-least-32-chars-long-default}
app.jwt.expiry-hours=${JWT_EXPIRY_HOURS:24}

# ── Exchange rate API (ConfigMap: URL + TTL, Secret: API key) ─────────────────
app.exchange.api-url=${EXCHANGE_API_URL:https://v6.exchangerate-api.com/v6}
app.exchange.api-key=${EXCHANGE_API_KEY:}
app.exchange.cache-ttl-seconds=${EXCHANGE_CACHE_TTL_SECONDS:60}
app.exchange.default-base=${EXCHANGE_DEFAULT_BASE:USD}

# ── Pagination (ConfigMap) ────────────────────────────────────────────────────
app.pagination.default-size=${PAGINATION_DEFAULT_SIZE:12}

# ── Seed data (Secret: admin password) ───────────────────────────────────────
app.seed.admin-password=${SEED_ADMIN_PASSWORD:admin123}

# ── Logging (ConfigMap) ──────────────────────────────────────────────────────
logging.level.root=${LOG_LEVEL:INFO}
logging.level.com.stockroom=DEBUG
logging.pattern.console=%d{HH:mm:ss} %-5level [%thread] %logger{20} - %msg%n

# ── Actuator (expose only what we need) ──────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
